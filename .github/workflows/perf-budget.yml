name: Perf Budget

# v1.2 P3 §5.43 follow-up — the config (`size-limit` array in package.json
# and .lighthouserc.json) landed earlier; this workflow is the CI hook
# that actually enforces it. Two jobs:
#
#   1. size-limit — runs on every push/PR, diffs the gzipped chunk sizes
#      against the budget declared in package.json. Fails if any entry
#      exceeds its limit.
#   2. lighthouse — runs on pushes to main (kept off PRs to save CI
#      minutes; LHCI is expensive). Boots the built app on localhost
#      and asserts the thresholds in .lighthouserc.json.
#
# Required GitHub Secrets (optional; both jobs run without them):
#   LHCI_GITHUB_APP_TOKEN — posts LHCI reports as PR status checks.
#
# Both jobs upload artifacts so the size delta / LHCI report survive
# after the run, even when secrets aren't configured.

on:
  push:
    branches: [main, next-port]
  pull_request:
    branches: [main, next-port]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size-limit:
    name: size-limit (bundle budget)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # size-limit reads .next/static/chunks/*.js so we need a real
        # Next.js build. ANALYZE is off — the webpack-bundle-analyzer
        # HTML is useful for humans but adds ~20s to the build.
        run: pnpm build
        env:
          # Next build writes runtime config; dummy values are fine for
          # a static chunk-size check. `next build` does NOT contact the
          # database.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
          BETTER_AUTH_SECRET: "ci-placeholder-secret-not-used-in-build"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run size-limit
        run: pnpm size-limit

      - name: Upload size-limit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: size-limit-report
          path: |
            .size-limit.json
            .next/build-manifest.json
          if-no-files-found: ignore
          retention-days: 14

  lighthouse:
    name: Lighthouse CI (core web vitals)
    # Re-enabled Perf-LH-2 (v1.14.0). Boot timing was the culprit:
    # `.lighthouserc.json` now declares `startServerCommand` +
    # `startServerReadyPattern: "Ready in"` so lhci waits for
    # Next.js's "✓ Ready in Xms" log line before navigating, and
    # `numberOfRuns: 1` keeps the run short.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: oneace_lhci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/oneace_lhci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/oneace_lhci
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-placeholder-secret-32-chars-min' }}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma schema to scratch DB
        # Same pattern as e2e.yml — `db push` while MIG-CHAIN-AUDIT
        # is pending. lhci autorun boots `next start` and the
        # middleware's auth path needs a live DB to return 200 for
        # the URLs in .lighthouserc.json.
        run: pnpm prisma db push --skip-generate --accept-data-loss

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI
        # lhci autorun reads .lighthouserc.json: it boots `next start`,
        # collects the URLs declared there (3 runs each, desktop
        # preset), asserts the thresholds, and uploads a report.
        run: pnpm exec lhci autorun --config=./.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload LHCI report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lhci-report
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14
