name: Perf Budget

# v1.2 P3 §5.43 follow-up — the config (`size-limit` array in package.json
# and .lighthouserc.json) landed earlier; this workflow is the CI hook
# that actually enforces it. Two jobs:
#
#   1. size-limit — runs on every push/PR, diffs the gzipped chunk sizes
#      against the budget declared in package.json. Fails if any entry
#      exceeds its limit.
#   2. lighthouse — runs on pushes to main (kept off PRs to save CI
#      minutes; LHCI is expensive). Boots the built app on localhost
#      and asserts the thresholds in .lighthouserc.json.
#
# Required GitHub Secrets (optional; both jobs run without them):
#   LHCI_GITHUB_APP_TOKEN — posts LHCI reports as PR status checks.
#
# Both jobs upload artifacts so the size delta / LHCI report survive
# after the run, even when secrets aren't configured.

on:
  push:
    branches: [main, next-port]
  pull_request:
    branches: [main, next-port]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size-limit:
    name: size-limit (bundle budget)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # size-limit reads .next/static/chunks/*.js so we need a real
        # Next.js build. ANALYZE is off — the webpack-bundle-analyzer
        # HTML is useful for humans but adds ~20s to the build.
        run: pnpm build
        env:
          # Next build writes runtime config; dummy values are fine for
          # a static chunk-size check. `next build` does NOT contact the
          # database.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
          BETTER_AUTH_SECRET: "ci-placeholder-secret-not-used-in-build"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run size-limit
        run: pnpm size-limit

      - name: Upload size-limit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: size-limit-report
          path: |
            .size-limit.json
            .next/build-manifest.json
          if-no-files-found: ignore
          retention-days: 14

  lighthouse:
    name: Lighthouse CI (core web vitals)
    # Perf-LH-2 (v1.14.1): Lighthouse measures the live Vercel
    # deployment instead of a CI-booted next-start. Why:
    #   - v1.13.0 added Postgres service + db push so middleware had
    #     a real DB → that fixed the auth-redirect interstitial.
    #   - v1.14.0 added explicit startServerCommand / ready pattern
    #     → that fixed the boot timing race.
    #   - But /login still returned 500 from prod build in CI,
    #     likely Sentry/PostHog init failing against stub env vars.
    # The Vercel deployment is the same prod build with real env, so
    # we point Lighthouse there directly (URLs are baked into
    # .lighthouserc.json). No Postgres service, no build, no
    # next-start — just a single curl-grade run against the
    # deployed app, which is exactly what end users hit.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        # We only need the @lhci/cli devDep — `pnpm install` is
        # the simplest way to materialize it.
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI against Vercel
        run: pnpm exec lhci autorun --config=./.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload LHCI report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lhci-report
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14
