name: Perf Budget

# v1.2 P3 §5.43 follow-up — the config (`size-limit` array in package.json
# and .lighthouserc.json) landed earlier; this workflow is the CI hook
# that actually enforces it. Two jobs:
#
#   1. size-limit — runs on every push/PR, diffs the gzipped chunk sizes
#      against the budget declared in package.json. Fails if any entry
#      exceeds its limit.
#   2. lighthouse — runs on pushes to main (kept off PRs to save CI
#      minutes; LHCI is expensive). Boots the built app on localhost
#      and asserts the thresholds in .lighthouserc.json.
#
# Required GitHub Secrets (optional; both jobs run without them):
#   LHCI_GITHUB_APP_TOKEN — posts LHCI reports as PR status checks.
#
# Both jobs upload artifacts so the size delta / LHCI report survive
# after the run, even when secrets aren't configured.

on:
  push:
    branches: [main, next-port]
  pull_request:
    branches: [main, next-port]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size-limit:
    name: size-limit (bundle budget)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # size-limit reads .next/static/chunks/*.js so we need a real
        # Next.js build. ANALYZE is off — the webpack-bundle-analyzer
        # HTML is useful for humans but adds ~20s to the build.
        run: pnpm build
        env:
          # Next build writes runtime config; dummy values are fine for
          # a static chunk-size check. `next build` does NOT contact the
          # database.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
          BETTER_AUTH_SECRET: "ci-placeholder-secret-not-used-in-build"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run size-limit
        run: pnpm size-limit

      - name: Upload size-limit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: size-limit-report
          path: |
            .size-limit.json
            .next/build-manifest.json
          if-no-files-found: ignore
          retention-days: 14

  lighthouse:
    name: Lighthouse CI (core web vitals)
    # DISABLED — `lhci autorun` boots `next start` against a stub
    # Postgres URL with no DB behind it. Middleware's auth/env path
    # tries to hit the DB on first request, the next-start process
    # returns a non-200 page, and Chrome shows an interstitial that
    # Lighthouse interprets as page-load failure (CHROME_INTERSTITIAL_ERROR).
    # To re-enable cleanly we need a Postgres service container +
    # `prisma migrate deploy` step before `lhci autorun`, mirroring
    # the e2e.yml pattern. Tracked as backlog Perf-LH-1.
    #
    # Until then, the size-limit job still gates bundle bloat on
    # every PR. Lighthouse stays opt-in via manual workflow_dispatch
    # once we land Perf-LH-1.
    if: false && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
          BETTER_AUTH_SECRET: "ci-placeholder-secret-not-used-in-build"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run Lighthouse CI
        # lhci autorun reads .lighthouserc.json: it boots `next start`,
        # collects the URLs declared there (3 runs each, desktop
        # preset), asserts the thresholds, and uploads a report.
        run: pnpm exec lhci autorun --config=./.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
          BETTER_AUTH_SECRET: "ci-placeholder-secret-not-used-in-build"

      - name: Upload LHCI report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lhci-report
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14
