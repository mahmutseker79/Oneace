name: E2E Tests

# Audit v1.1 §5.22 — run Playwright on every PR against main/next-port so
# e2e smoke joins lint/typecheck/vitest as a merge gate. Manual dispatch
# stays so maintainers can still re-run on demand without pushing.
on:
  push:
    branches: [main, next-port]
  pull_request:
    branches: [main, next-port]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip on forks (no secrets). Internal PRs and pushes run normally.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    # Sprint 6 (v1.12.0): use a scratch Postgres service container
    # mirroring the `migrations` job in ci.yml. Previously this job
    # depended on repo-level Secrets (DATABASE_URL / DIRECT_URL /
    # BETTER_AUTH_SECRET) being populated; when they weren't, the
    # WebServer's env validation aborted and Playwright timed out
    # after 60s waiting for localhost:3000. The literal config below
    # is self-contained — runs even from a fresh fork or before any
    # secret is configured.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: oneace_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/oneace_e2e
      DIRECT_URL: postgresql://ci:ci@localhost:5432/oneace_e2e
      # env schema requires ≥32 chars; literal placeholder is fine
      # because no prod auth flow runs against this scratch DB.
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-placeholder-secret-32-chars-min' }}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations to scratch DB
        # MIG-CHAIN-AUDIT closed in v1.13.0 — chain now applies
        # cleanly to a fresh Postgres (E2E-MIG-1 fixed
        # MigrationSource in 142430; v1.13.0 fixed Integration +
        # IntegrationProvider/Status in 20260418_drift_fix). Stay
        # on `migrate deploy` so this exercises the same code path
        # that runs against production.
        run: pnpm prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
