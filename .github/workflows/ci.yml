name: CI

# Required GitHub Secrets:
#   DATABASE_URL         — PostgreSQL connection string for Prisma
#   DIRECT_URL           — Direct PostgreSQL connection (for migrations)
#   BETTER_AUTH_SECRET   — Auth encryption key

on:
  push:
    branches: [main, next-port]
  pull_request:
    branches: [main, next-port]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          set +e
          pnpm typecheck
          EXIT=$?
          echo "=== typecheck exit=$EXIT ==="
          if [ $EXIT -ne 0 ]; then
            echo "=== tsconfig.json ==="
            cat tsconfig.json
            echo "=== prisma generated exists? ==="
            ls -la src/generated/prisma/ 2>&1 | head -5 || echo "MISSING"
            echo "=== escaped path check ==="
            find src -name 'migration-*' -type f 2>&1 | head -10
          fi
          exit $EXIT

      - name: Lint (Biome)
        run: |
          set +e
          pnpm lint
          EXIT=$?
          echo "::group::Biome re-run (errors only)"
          pnpm exec biome check --diagnostic-level=error .
          ERRORS_EXIT=$?
          echo "::endgroup::"
          echo "pnpm lint exit=$EXIT; errors-only exit=$ERRORS_EXIT"
          # Only fail if actual errors (not just warnings) were found
          exit $ERRORS_EXIT

  test:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-type-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  prisma-validate:
    name: Prisma Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: |
          set +e
          pnpm prisma validate
          EXIT=$?
          echo "=== prisma validate exit=$EXIT ==="
          if [ $EXIT -ne 0 ]; then
            echo "=== env check ==="
            echo "DATABASE_URL set: ${DATABASE_URL:+yes}"
            echo "DIRECT_URL set: ${DIRECT_URL:+yes}"
            echo "=== schema head ==="
            head -20 prisma/schema.prisma
          fi
          exit $EXIT
