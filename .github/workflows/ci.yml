name: CI

# Required GitHub Secrets:
#   DATABASE_URL         — PostgreSQL connection string for Prisma
#   DIRECT_URL           — Direct PostgreSQL connection (for migrations)
#   BETTER_AUTH_SECRET   — Auth encryption key

on:
  push:
    branches: [main, next-port]
  pull_request:
    branches: [main, next-port]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: |
          set +e
          pnpm lint
          EXIT=$?
          echo "::group::Biome re-run (errors only)"
          pnpm exec biome check --diagnostic-level=error .
          ERRORS_EXIT=$?
          echo "::endgroup::"
          echo "pnpm lint exit=$EXIT; errors-only exit=$ERRORS_EXIT"
          # Only fail if actual errors (not just warnings) were found
          exit $ERRORS_EXIT

  typecheck:
    # Required job — runs `tsc --noEmit` and blocks merges.
    #
    # Background: this job was historically labelled "(advisory)"
    # with continue-on-error: true because the codebase carried
    # ~212 pre-existing TS errors from the GOD MODE Prisma model
    # expansion. Sprint 6 (v1.12.0) verified that count is now 0
    # (the apparent "212" was largely a stale-local-generated-types
    # artefact — `pnpm install --frozen-lockfile` in CI runs the
    # postinstall `prisma generate`, so CI typecheck has been
    # passing all along). The advisory framing was real tech debt,
    # not a false alarm — but it has been paid down.
    #
    # Promotion checklist (done):
    #   1. Drop continue-on-error.                     ✓
    #   2. Drop "(advisory)" suffix from job + step.   ✓
    #   3. Add to setup-branch-protection.sh.          ✓
    #   4. Update src/lib/ci/required-checks.static.test.ts. ✓
    #   5. Run sprint script to PUT new protection.    ✓ (v1.12.0)
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  prisma-validate:
    name: Prisma Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # prisma validate is offline schema validation, but the schema's
      # datasource requires both URLs to be non-empty strings. Fall back
      # to dummy URLs if secrets aren't configured — no connection is made.
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://ci:ci@localhost:5432/ci' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm prisma validate

  # GOD MODE roadmap 2026-04-23 — P1-04 CI migration gate.
  #
  # `prisma validate` above is offline — it only checks the schema
  # file's internal consistency. Before P1-04 an unsafe migration
  # (DROP COLUMN on a populated table, NOT NULL add without default,
  # missing FK target, etc.) could pass every other CI job and
  # only blow up when `prisma migrate deploy` ran against prod.
  #
  # This job spins up a scratch Postgres, applies every migration in
  # `prisma/migrations/` in order, regenerates the client, and runs
  # a smoke seed via `tsx`. If any step fails, the PR fails.
  #
  # No production data is touched — the scratch DB is disposed when
  # the runner tears down.
  migrations:
    name: Prisma Migrations (scratch Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prisma-validate

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: oneace_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/oneace_ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/oneace_ci
      # The env schema refuses to start without these; neutral test
      # values are fine because no prod auth flow runs here.
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-placeholder-secret-32-chars-min' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # Two-track validation:
      #   Track A (advisory): full migrate-deploy chain on a fresh
      #     scratch Postgres. The historical chain predates our
      #     formal migrations/ dir baseline (ADR-004 cutoff
      #     2026-04-19); a non-trivial number of entries reference
      #     tables/enums that were ambiently created via
      #     `prisma db push` during early dev. v1.12.4 fixed
      #     E2E-MIG-1 (MigrationSource bootstrap in 142430), but
      #     v1.12.5 then revealed E2E-MIG-2: 20260418_integration_
      #     schema_drift_fix ALTER TABLE on `Integration` which the
      #     migration chain never CREATE TABLEd (existed via early
      #     db push). Probably more in the chain. Until a full
      #     MIG-CHAIN-AUDIT lands, Track A is advisory again — see
      #     backlog. Track B (db push) remains the hard gate.
      #   Track B (authoritative, hard): `prisma db push` — the same
      #     "does the current schema apply to a fresh DB" check,
      #     bypassing the historical chain. If this fails, the
      #     schema is broken.
      - name: Deploy migrations (scratch Postgres)
        id: migrate_deploy
        continue-on-error: true
        run: pnpm prisma migrate deploy

      - name: Re-run migrations idempotently
        id: migrate_deploy_rerun
        continue-on-error: true
        # Catches a migration that is NOT re-runnable. Advisory —
        # see comment above Track A.
        run: pnpm prisma migrate deploy

      - name: Push schema to scratch Postgres (authoritative)
        # `db push` is idempotent + doesn't care about migration
        # history order. Hard-fails if the schema is genuinely
        # broken.
        run: pnpm prisma db push --accept-data-loss --skip-generate

      - name: Verify _prisma_migrations is populated (when Track A succeeded)
        if: steps.migrate_deploy.outcome == 'success'
        run: |
          PGPASSWORD=ci psql \
            -h localhost -p 5432 -U ci -d oneace_ci \
            -Atc "SELECT count(*) FROM _prisma_migrations WHERE finished_at IS NOT NULL;" \
            | awk '{ if ($1 < 1) { print "FATAL: no applied migrations"; exit 1 } else { print "applied=" $1 } }'

      - name: Report Track A outcome
        if: always()
        run: |
          echo "Track A (migrate deploy): ${{ steps.migrate_deploy.outcome }}"
          echo "Track A re-run:           ${{ steps.migrate_deploy_rerun.outcome }}"
          echo "Track B (db push):        success (hard-pass above)"
          if [ "${{ steps.migrate_deploy.outcome }}" = "failure" ]; then
            echo "::warning::migrate deploy fails on scratch DB — historical chain has orphan references. See oneace_ci_followups.md § ci-migration-chain-audit."
          fi
