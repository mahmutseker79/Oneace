# P2-4 (audit v1.1 §5.26) — dependency upgrade automation.
#
# Before this file existed there was no automated CVE alert path: a high
# severity advisory on `next`, `@prisma/client`, or `stripe` would sit
# unnoticed until someone manually ran `pnpm outdated`. Dependabot closes
# that gap by opening upgrade PRs on a cadence.
#
# Design choices:
#   - Weekly (Monday) for npm: small enough batches to review, not so
#     often that the PR queue becomes noise.
#   - Prod vs. dev grouped separately so a weekend of dev-tool churn
#     (biome, vitest, typescript) doesn't block a security patch on a
#     production dep.
#   - Major-version bumps opted out of grouping via `update-types` so
#     breaking changes arrive as standalone, reviewable PRs.
#   - github-actions ecosystem on a separate, slower schedule; action
#     versions change less and breaking here is much rarer.
#   - `open-pull-requests-limit: 5` bounds the review surface so we
#     don't wake up to 30 open PRs after a busy week upstream.
#
# Renovate was considered but rejected: Dependabot is GitHub-native
# (no third-party app install), enough for the current scope, and the
# team is already familiar with its PR UX.

version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    groups:
      prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Major bumps land as individual PRs so the reviewer can read the
    # changelog one at a time. This is intentional — do NOT add "major"
    # to the groups above unless you also want the queue to bunch up.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
