openapi: 3.1.0
info:
  title: OneAce API
  version: 1.0.0
  description: |
    OneAce is a comprehensive inventory management and stock counting platform.

    ## Authentication
    Most endpoints require authentication via session cookie (from Better Auth).
    Some endpoints (webhooks, cron, health) are public but have additional security measures.

    ## Rate Limiting
    Rate limits vary by endpoint. When rate-limited, the response includes:
    - `Retry-After` header: seconds until the next request is allowed
    - `X-RateLimit-*` headers: current limit status

    ## Error Responses
    All error responses include an `error` field describing the issue.
    Common status codes:
    - 400: Invalid request
    - 401: Unauthenticated or invalid credentials
    - 403: Forbidden / insufficient permissions
    - 404: Resource not found
    - 429: Rate limited
    - 500: Internal server error
    - 503: Service unavailable

servers:
  - url: https://oneace-next-local.vercel.app/api
    description: Production
  - url: http://localhost:3000/api
    description: Local development

tags:
  - name: Account
    description: User account management and GDPR data operations
  - name: Auth
    description: Authentication and authorization endpoints (Better Auth)
  - name: Billing
    description: Stripe subscription management and webhooks
  - name: Cron
    description: Scheduled background tasks
  - name: Health
    description: Health checks and diagnostics
  - name: Integrations
    description: Third-party integrations (QuickBooks, Shopify)
  - name: Labels
    description: Barcode and bin label generation
  - name: Migrations
    description: Data migration jobs for importing from legacy inventory systems
  - name: Onboarding
    description: Initial setup and organization creation
  - name: Reports
    description: Analytics, exports, and business intelligence
  - name: Upload
    description: File upload operations
  - name: Webhooks
    description: Inbound webhook handling and event processing

paths:
  /account/delete:
    post:
      tags:
        - Account
      summary: Delete user account
      description: |
        Permanently delete the authenticated user account. Requires confirmation phrase.
        Requires active session cookie. Rate limited: 1 per hour per user.
        User cannot be owner of any organization.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmation:
                  type: string
                  description: Must be exactly "DELETE MY ACCOUNT"
                  example: "DELETE MY ACCOUNT"
              required:
                - confirmation
      responses:
        200:
          description: Account successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
        400:
          description: Invalid confirmation phrase
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        403:
          description: User is owner of an organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  ownedOrganizations:
                    type: array
                    items:
                      type: string
        429:
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        401:
          description: Unauthenticated
        500:
          description: Internal server error

  /account/export:
    get:
      tags:
        - Account
      summary: Export user data (GDPR)
      description: |
        Download all user data as JSON file. Requires active session.
        Rate limited: 2 per hour per user.
        Export fails if user has more than 50,000 items.
      security:
        - sessionCookie: []
      responses:
        200:
          description: User data JSON file
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportDate:
                    type: string
                    format: date-time
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                      emailVerified:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                  memberships:
                    type: array
                  items:
                    type: array
                  stockMovements:
                    type: array
                  stockCounts:
                    type: array
                  countEntries:
                    type: array
                  purchaseOrders:
                    type: array
                  auditEvents:
                    type: array
                  sessions:
                    type: array
                  accounts:
                    type: array
        413:
          description: Export too large
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        429:
          description: Rate limit exceeded
        401:
          description: Unauthenticated
        500:
          description: Internal server error

  /account/sessions:
    get:
      tags:
        - Account
      summary: List the caller's active sessions
      description: |
        Returns the Better-Auth `Session` rows for the current user.
        Each row carries metadata only (no session token). The `current`
        flag marks the session that authenticated this request.

        Rate limited: 30 requests per minute per user.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        userAgent:
                          type: string
                          nullable: true
                        ipAddress:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                        expiresAt:
                          type: string
                          format: date-time
                        current:
                          type: boolean
        401:
          description: Unauthenticated
        429:
          description: Rate limit exceeded
        500:
          description: Internal server error

  /account/sessions/{id}/revoke:
    post:
      tags:
        - Account
      summary: Revoke one specific session
      description: |
        Deletes the Better-Auth `Session` row with the given id.
        The session MUST belong to the caller — a foreign id returns
        404 so a caller cannot probe session ownership. The current
        session is refused with a dedicated `CURRENT_SESSION` code.

        Rate limited: 10 revokes per minute per user.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  revokedId:
                    type: string
        400:
          description: Cannot revoke the current session
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
        401:
          description: Unauthenticated
        404:
          description: Session not found (or not owned by caller)
        429:
          description: Rate limit exceeded
        500:
          description: Internal server error

  /account/sessions/revoke-all:
    post:
      tags:
        - Account
      summary: Revoke all sessions except the current one
      description: |
        Stolen-device recovery. Deletes every Better-Auth `Session`
        row for the caller EXCEPT the one that authenticated this
        request. Returns the count of revoked rows so the UI can
        confirm "Revoked N sessions.".

        Rate limited: 5 per hour per user.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  revokedCount:
                    type: integer
                  keptSessionId:
                    type: string
        401:
          description: Unauthenticated
        429:
          description: Rate limit exceeded
        500:
          description: Internal server error

  /auth/{...all}:
    get:
      tags:
        - Auth
      summary: Better Auth GET routes
      description: |
        Catch-all for Better Auth GET endpoints (session validation, etc).
        Forwarded to Better Auth router.
      parameters:
        - name: "...all"
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
        401:
          description: Unauthorized
        500:
          description: Internal server error
    post:
      tags:
        - Auth
      summary: Better Auth POST routes
      description: |
        Catch-all for Better Auth POST endpoints (sign-in, sign-up, etc).
        Includes registration gate and rate limiting:
        - Sign-in: 5 attempts per 5 minutes per IP
        - Sign-up: 3 per hour per IP, 2 per hour per email
      parameters:
        - name: "...all"
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
        403:
          description: Registration disabled or rate limit exceeded
        429:
          description: Rate limit exceeded
        500:
          description: Internal server error

  /auth/two-factor/verify:
    post:
      tags:
        - Auth
      summary: Verify 2FA code
      description: |
        Verify a TOTP or backup code after email/password authentication.
        Called when 2FA is enabled for the user.
        Rate limited: 10 per 5 minutes per user, plus per-IP limit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  description: User ID to verify
                code:
                  type: string
                  description: 6-digit TOTP or 8-char backup code
                sessionToken:
                  type: string
                  description: Optional pending session token from Better Auth
              required:
                - userId
                - code
      responses:
        200:
          description: Code verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  remainingBackupCodes:
                    type: integer
        400:
          description: Invalid or missing parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  verified:
                    type: boolean
        429:
          description: Rate limit exceeded
        500:
          description: Internal server error

  /billing/checkout:
    post:
      tags:
        - Billing
      summary: Create Stripe checkout session
      description: |
        Create a checkout session for subscription upgrade.
        Requires OWNER or ADMIN role. Stripe must be configured.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan:
                  type: string
                  enum: [PRO, BUSINESS]
                  description: Target plan
                interval:
                  type: string
                  enum: [month, year]
                  description: Billing interval (optional, defaults to month)
              required:
                - plan
      responses:
        200:
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Stripe checkout URL
        400:
          description: Invalid request or plan
        401:
          description: Unauthenticated
        403:
          description: Insufficient permissions
        404:
          description: Organization not found
        503:
          description: Stripe not configured

  /billing/portal:
    post:
      tags:
        - Billing
      summary: Create billing portal session
      description: |
        Create a Billing Portal session for subscription management.
        Requires OWNER or ADMIN role and existing Stripe customer.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Portal session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Billing portal URL
        401:
          description: Unauthenticated
        403:
          description: Insufficient permissions
        404:
          description: No billing account found
        503:
          description: Stripe not configured

  /billing/webhook:
    post:
      tags:
        - Billing
      summary: Stripe webhook endpoint
      description: |
        Receives Stripe events and updates subscription status.
        Public endpoint. Requires Stripe signature verification.
        Handles: checkout.session.completed, customer.subscription.updated/deleted,
        invoice.payment_failed/succeeded
      parameters:
        - name: stripe-signature
          in: header
          required: true
          schema:
            type: string
          description: Stripe webhook signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Event processed
        400:
          description: Invalid signature or missing fields
        500:
          description: Processing failed (Stripe will retry)
        503:
          description: Billing not configured

  /cron/cleanup-migration-files:
    get:
      tags:
        - Cron
      summary: Clean up orphaned migration upload files
      description: |
        Deletes upload blobs for migration jobs that finished (succeeded, failed,
        or cancelled) more than 30 days ago. Idempotent via the CronRun ledger.
        Requires Bearer token authorization.
      security:
        - bearerToken: []
      responses:
        200:
          description: Cleanup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  scanned:
                    type: integer
        401:
          description: Unauthorized (invalid token)
        503:
          description: CRON_SECRET not configured

  /cron/cleanup-notifications:
    get:
      tags:
        - Cron
      summary: Apply notification retention policy
      description: |
        Removes in-app notifications beyond the retention window configured per
        type (see `src/lib/notifications/retention.ts`). Idempotent via the
        CronRun ledger. Requires Bearer token authorization.
      security:
        - bearerToken: []
      responses:
        200:
          description: Retention pass completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
        401:
          description: Unauthorized (invalid token)
        503:
          description: CRON_SECRET not configured

  /cron/cleanup-cronruns:
    get:
      tags:
        - Cron
      summary: Apply CronRun ledger retention policy
      description: |
        Prunes `CronRun` rows older than 90 days on `startedAt`. Keeps the
        ledger bounded while preserving a rolling quarter of run history for
        debugging. Idempotent via the CronRun ledger itself (the current
        run's row is never in scope, since it is 0 seconds old). Supports
        `?dryRun=1` for a read-only count. Requires Bearer token authorization.
      security:
        - bearerToken: []
      responses:
        200:
          description: Retention pass completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  agedDeleted:
                    type: integer
                  retentionDays:
                    type: integer
                  cutoff:
                    type: string
                    format: date-time
                  dryRun:
                    type: boolean
                  tookMs:
                    type: integer
        401:
          description: Unauthorized (invalid token)
        503:
          description: CRON_SECRET not configured

  /cron/vercel-webhook-health:
    get:
      tags:
        - Cron
      summary: Detect silent-main-webhook sendromu
      description: |
        Every 30 min, compares the GitHub `main` HEAD SHA against the
        `commit` field of the production `/api/health` endpoint. If the
        two differ AND the GitHub commit is older than the stale
        threshold (default 30 min), emits a `webhook-health.silent`
        structured log for the ops alert rule. A distinct
        `webhook-health.prod-down` tag is emitted when `/api/health`
        itself returns 5xx, so alert routing can split the two failure
        modes. Gracefully degrades (200 `skipped`) when env config is
        missing or the transport flakes. Requires Bearer token
        authorization. Audit v1.3 §5.45 F-01.
      security:
        - bearerToken: []
      responses:
        200:
          description: Check completed (match, silent, prod-down, or skipped)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
                    enum: [match, silent, prod-down, skipped]
                  alarm:
                    type: string
                    enum: [silent, prod-down]
                  sha:
                    type: string
                  commit:
                    type: string
                  expectedSha:
                    type: string
                  deployedCommit:
                    type: string
                  commitAgeMinutes:
                    type: integer
                  githubCommitAt:
                    type: string
                    format: date-time
                  reason:
                    type: string
                    enum: [config, transport]
                  healthStatus:
                    type: integer
        401:
          description: Unauthorized (invalid token)
        500:
          description: CRON_SECRET not configured

  /cron/process-imports:
    get:
      tags:
        - Cron
      summary: Process queued migration imports
      description: |
        Drains the migration processing queue — picks up PENDING or PROCESSING
        jobs and advances them through parse/map/write stages. Idempotent via
        the CronRun ledger. Requires Bearer token authorization.
      security:
        - bearerToken: []
      responses:
        200:
          description: Processing pass completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        401:
          description: Unauthorized (invalid token)
        503:
          description: CRON_SECRET not configured

  /cron/stock-count-triggers:
    get:
      tags:
        - Cron
      summary: Trigger stock count pass
      description: |
        Executes stock count trigger pass for all recurring templates.
        Called every 15 minutes by Vercel Cron or external scheduler.
        Requires Bearer token authorization.
      security:
        - bearerToken: []
      responses:
        200:
          description: Trigger pass completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  triggered:
                    type: integer
                    description: Count of templates triggered
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        organizationId:
                          type: string
                        templateId:
                          type: string
                        countId:
                          type: string
                          nullable: true
                        reason:
                          type: string
        401:
          description: Unauthorized (invalid token)
        503:
          description: CRON_SECRET not configured

  /debug-dashboard:
    get:
      tags:
        - Health
      summary: Debug dashboard queries
      description: |
        Tests database connectivity and core queries.
        Requires active session. Returns results of each query.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Query results
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        500:
          description: Authentication or database error

  /health:
    get:
      tags:
        - Health
      summary: Health and readiness check
      description: |
        Comprehensive health probe with 4 sub-checks:
        1. Liveness: Is the server running?
        2. Database connectivity: Can we reach Postgres?
        3. Schema sentinel: Are core tables present?
        4. Migrations: Have all migrations been applied?

        No authentication required.
      responses:
        200:
          description: Healthy and ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthPayload'
        503:
          description: Not ready or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthPayload'

  /integrations/quickbooks/callback:
    get:
      tags:
        - Integrations
      summary: QuickBooks OAuth callback
      description: |
        Receives OAuth callback from QuickBooks.
        Exchanges authorization code for access token and stores integration.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State parameter (HMAC signed)
        - name: realmId
          in: query
          required: true
          schema:
            type: string
          description: QuickBooks realm ID
      responses:
        302:
          description: Redirect to settings page with success/error status
        400:
          description: Missing OAuth parameters
        403:
          description: Invalid state signature

  /integrations/quickbooks/webhooks:
    get:
      tags:
        - Integrations
      summary: QuickBooks webhook verification challenge
      description: |
        Intuit periodically GETs this endpoint with a verifier challenge to
        confirm the webhook URL is live. Returns the challenge verbatim.
        Public endpoint, no signature required.
      parameters:
        - name: challenge
          in: query
          required: false
          schema:
            type: string
      responses:
        200:
          description: Challenge echoed back
          content:
            text/plain:
              schema:
                type: string
    post:
      tags:
        - Integrations
      summary: QuickBooks webhook receiver
      description: |
        Receives entity change notifications from QuickBooks Online.
        Public endpoint. Requires HMAC-SHA256 signature verification.
      parameters:
        - name: intuit-signature
          in: header
          required: true
          schema:
            type: string
      responses:
        200:
          description: Webhooks processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  processed:
                    type: integer
        401:
          description: Invalid signature
        503:
          description: Webhook not configured

  /integrations/shopify/callback:
    get:
      tags:
        - Integrations
      summary: Shopify OAuth callback
      description: |
        Receives OAuth callback from Shopify.
        Exchanges authorization code for access token and stores integration.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: shop
          in: query
          required: true
          schema:
            type: string
          description: Shopify store domain
        - name: hmac
          in: query
          required: true
          schema:
            type: string
      responses:
        302:
          description: Redirect to settings page with success/error status
        400:
          description: Missing OAuth parameters
        403:
          description: Invalid state signature

  /integrations/shopify/webhooks:
    post:
      tags:
        - Integrations
      summary: Shopify webhook receiver
      description: |
        Receives topic notifications from Shopify.
        Public endpoint. Requires HMAC-SHA256 signature verification.
      parameters:
        - name: x-shopify-hmac-sha256
          in: header
          required: true
          schema:
            type: string
        - name: x-shopify-topic
          in: header
          required: true
          schema:
            type: string
        - name: x-shopify-shop-domain
          in: header
          required: true
          schema:
            type: string
      responses:
        200:
          description: Webhook processed
        400:
          description: Missing headers or invalid JSON
        401:
          description: Invalid signature
        503:
          description: Webhook not configured

  /labels/bin-labels/pdf:
    get:
      tags:
        - Labels
      summary: Generate bin labels PDF
      description: |
        Generate PDF with barcode labels for all bins in a warehouse.
        Requires active session and warehouse access.
      security:
        - sessionCookie: []
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: string
          description: Warehouse ID
      responses:
        200:
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        400:
          description: Missing or invalid warehouseId
        404:
          description: Warehouse not found
        401:
          description: Unauthenticated

  /labels/custom/pdf:
    post:
      tags:
        - Labels
      summary: Generate custom labels PDF
      description: |
        Generate custom labels from template for items, bins, or warehouses.
        Returns JSON (PDF generation is placeholder in implementation).
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateId:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [warehouse, bin, item]
                      id:
                        type: string
                  minItems: 1
              required:
                - templateId
                - items
      responses:
        200:
          description: Label data (JSON placeholder)
          content:
            application/json:
              schema:
                type: object
        400:
          description: Invalid request
        404:
          description: Template or items not found
        401:
          description: Unauthenticated

  /migrations:
    get:
      tags:
        - Migrations
      summary: List migrations
      description: |
        Returns all migration jobs for the authenticated user's organization,
        newest first. Requires an active session.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Migrations list
          content:
            application/json:
              schema:
                type: object
                properties:
                  migrations:
                    type: array
                    items:
                      type: object
        401:
          description: Unauthenticated
        500:
          description: Internal error
    post:
      tags:
        - Migrations
      summary: Create a migration job
      description: |
        Creates a new migration job for one of the supported legacy systems.
        Requires the `integrations.connect` capability.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  enum:
                    - SORTLY
                    - INFLOW
                    - FISHBOWL
                    - CIN7
                    - SOS_INVENTORY
                    - QUICKBOOKS_ONLINE
                    - QUICKBOOKS_DESKTOP
              required:
                - source
      responses:
        201:
          description: Migration created
        400:
          description: Invalid source
        401:
          description: Unauthenticated
        403:
          description: Forbidden / insufficient permissions

  /migrations/{id}:
    get:
      tags:
        - Migrations
      summary: Get migration detail
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Migration job with progress + mapping + sample rows
        401:
          description: Unauthenticated
        404:
          description: Migration not found
    delete:
      tags:
        - Migrations
      summary: Soft-delete a migration job
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Migration archived
        401:
          description: Unauthenticated
        403:
          description: Forbidden
        404:
          description: Migration not found

  /migrations/{id}/cancel:
    post:
      tags:
        - Migrations
      summary: Cancel a running migration
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Migration cancelled
        401:
          description: Unauthenticated
        404:
          description: Migration not found
        409:
          description: Migration not cancellable in current state

  /migrations/{id}/detect:
    post:
      tags:
        - Migrations
      summary: Detect source schema from uploaded files
      description: |
        Parses the uploaded files using the adapter for the migration's source
        and returns the detected columns + sample rows so the user can confirm
        mappings before validation.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Schema detected
        401:
          description: Unauthenticated
        404:
          description: Migration not found

  /migrations/{id}/mapping:
    put:
      tags:
        - Migrations
      summary: Save field mappings
      description: |
        Persists the user-confirmed field mappings so validate/start can use
        them. Body is the mapping set specific to the migration source.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Mappings saved
        400:
          description: Invalid mapping shape
        401:
          description: Unauthenticated
        404:
          description: Migration not found

  /migrations/{id}/rollback:
    post:
      tags:
        - Migrations
      summary: Roll back a completed migration
      description: |
        Reverses writes made by a previously successful migration. Idempotent.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Rollback completed
        401:
          description: Unauthenticated
        404:
          description: Migration not found
        409:
          description: Migration not rollbackable in current state

  /migrations/{id}/start:
    post:
      tags:
        - Migrations
      summary: Start migration import
      description: |
        Runs the adapter with the saved mappings and begins writing data into
        the target org. Transitions the job to PROCESSING.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Migration started
        401:
          description: Unauthenticated
        404:
          description: Migration not found
        409:
          description: Migration not ready to start (no mappings, already running, etc.)

  /migrations/{id}/status:
    get:
      tags:
        - Migrations
      summary: Poll migration status
      description: |
        Lightweight status/progress read for polling from the UI. Returns the
        current state, counters, and last error (if any).
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Current status
        401:
          description: Unauthenticated
        404:
          description: Migration not found

  /migrations/{id}/upload:
    post:
      tags:
        - Migrations
      summary: Upload migration source files
      description: |
        Accepts multipart form data with one or more files for the adapter to
        parse. Files are stored as blobs referenced by the migration job.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        200:
          description: Files uploaded
        401:
          description: Unauthenticated
        404:
          description: Migration not found
        413:
          description: File too large

  /migrations/{id}/validate:
    post:
      tags:
        - Migrations
      summary: Validate migration against mappings
      description: |
        Dry-runs the adapter against the uploaded files with the saved mappings
        and reports blocking errors and warnings without writing anything.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Validation report
        401:
          description: Unauthenticated
        404:
          description: Migration not found

  /onboarding/migration-start:
    post:
      tags:
        - Onboarding
      summary: Create organization AND seed a migration job in one call
      description: |
        Convenience endpoint used by the onboarding wizard — creates the
        organization (like `POST /onboarding/organization`) and in the same
        transaction seeds a migration job for the selected legacy system so the
        user can jump straight into upload/mapping.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 80
                source:
                  type: string
                  enum:
                    - SORTLY
                    - INFLOW
                    - FISHBOWL
                    - CIN7
                    - SOS_INVENTORY
                    - QUICKBOOKS_ONLINE
                    - QUICKBOOKS_DESKTOP
              required:
                - name
                - source
      responses:
        201:
          description: Organization + migration created
        400:
          description: Invalid request
        401:
          description: Unauthenticated
        429:
          description: Rate limit exceeded

  /onboarding/organization:
    post:
      tags:
        - Onboarding
      summary: Create organization
      description: |
        Create a new organization with authenticated user as OWNER.
        Automatically creates default warehouse and sends welcome email.
        Rate limited: 3 per hour per user.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 80
                  description: Organization name
              required:
                - name
      responses:
        201:
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                      warehouses:
                        type: array
        400:
          description: Invalid request
        401:
          description: Unauthenticated
        429:
          description: Rate limit exceeded
    patch:
      tags:
        - Onboarding
      summary: Update organization settings during onboarding
      description: |
        Partial update of the current organization (name, locale, etc.).
        Scoped to the onboarding track — post-onboarding updates should use
        the settings surface instead. Requires an active session and
        `org.settings` capability.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 80
      responses:
        200:
          description: Organization updated
        400:
          description: Invalid request
        401:
          description: Unauthenticated
        403:
          description: Forbidden / insufficient permissions

