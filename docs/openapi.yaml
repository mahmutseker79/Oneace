  /webhooks/inbound:
    post:
      tags:
        - Webhooks
      summary: Receive inbound webhooks
      description: |
        Generic inbound webhook endpoint for integration events.
        Public endpoint. Requires HMAC-SHA256 signature verification.
        Supports multiple event types (imports, syncs, stock counts, etc).
      parameters:
        - name: x-webhook-signature
          in: header
          required: true
          schema:
            type: string
        - name: x-webhook-timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: x-webhook-delivery-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  description: Event type (e.g., integration.sync.items)
                organizationId:
                  type: string
                data:
                  type: object
              required:
                - event
                - organizationId
                - data
      responses:
        200:
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deliveryId:
                    type: string
                  processed:
                    type: boolean
                  action:
                    type: string
        400:
          description: Invalid JSON, missing headers, or payload too nested
        401:
          description: Invalid signature
        404:
          description: Organization not found
        413:
          description: Payload too large
        500:
          description: Processing error
    head:
      tags:
        - Webhooks
      summary: Webhook health check
      description: Health check endpoint for webhook delivery validation.
      responses:
        200:
          description: Healthy

  /webhooks/resend:
    post:
      tags:
        - Webhooks
      summary: Receive Resend delivery events
      description: |
        Receives email delivery events (`email.delivered`, `email.bounced`,
        `email.complained`, etc.) from Resend. Public endpoint, but requires
        the `svix-id` / `svix-timestamp` / `svix-signature` headers for
        signature verification (Resend uses Svix for webhook signing).
        Updates the deliverability guard so bounced/complaint recipients are
        not retried.
      parameters:
        - name: svix-id
          in: header
          required: true
          schema:
            type: string
        - name: svix-timestamp
          in: header
          required: true
          schema:
            type: string
        - name: svix-signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: Resend event type (e.g., email.bounced)
                data:
                  type: object
              required:
                - type
                - data
      responses:
        200:
          description: Event processed
        400:
          description: Invalid payload
        401:
          description: Invalid signature
        500:
          description: Processing error
    head:
      tags:
        - Webhooks
      summary: Resend webhook health check
      description: Idempotent health check for the Resend webhook URL.
      responses:
        200:
          description: Healthy

components:
  schemas:
    HealthPayload:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        uptime:
          type: integer
          description: Server uptime in seconds
        timestamp:
          type: string
          format: date-time
        environment:
          type: string
          description: Node environment (e.g., production)
        version:
          type: string
          description: Deployment version
        commit:
          type: string
          description: Commit SHA (first 7 chars)
        checks:
          type: object
          properties:
            database:
              type: string
              enum: [ok, fail]
            schema:
              type: string
              enum: [ok, fail]
            migrations:
              type: string
              enum: [ok, fail, skipped]
        errors:
          type: array
          items:
            type: string
          description: Error messages (only present when status is degraded)

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Better Auth session cookie
    bearerToken:
      type: http
      scheme: bearer
      description: Bearer token for cron endpoints (CRON_SECRET)
