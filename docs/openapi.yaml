openapi: 3.1.0
info:
  title: OneAce API
  version: 1.0.0
  description: |
    OneAce is a comprehensive inventory management and stock counting platform.

    ## Authentication
    Most endpoints require authentication via session cookie (from Better Auth).
    Some endpoints (webhooks, cron, health) are public but have additional security measures.

    ## Rate Limiting
    Rate limits vary by endpoint. When rate-limited, the response includes:
    - `Retry-After` header: seconds until the next request is allowed
    - `X-RateLimit-*` headers: current limit status

    ## Error Responses
    All error responses include an `error` field describing the issue.
    Common status codes:
    - 400: Invalid request
    - 401: Unauthenticated or invalid credentials
    - 403: Forbidden / insufficient permissions
    - 404: Resource not found
    - 429: Rate limited
    - 500: Internal server error
    - 503: Service unavailable

servers:
  - url: https://oneace-next-local.vercel.app/api
    description: Production
  - url: http://localhost:3000/api
    description: Local development

tags:
  - name: Account
    description: User account management and GDPR data operations
  - name: Auth
    description: Authentication and authorization endpoints (Better Auth)
  - name: Billing
    description: Stripe subscription management and webhooks
  - name: Cron
    description: Scheduled background tasks
  - name: Health
    description: Health checks and diagnostics
  - name: Integrations
    description: Third-party integrations (QuickBooks, Shopify)
  - name: Labels
    description: Barcode and bin label generation
  - name: Onboarding
    description: Initial setup and organization creation
  - name: Reports
    description: Analytics, exports, and business intelligence
  - name: Upload
    description: File upload operations
  - name: Webhooks
    description: Inbound webhook handling and event processing

paths:
  /account/delete:
    post:
      tags:
        - Account
      summary: Delete user account
      description: |
        Permanently delete the authenticated user account. Requires confirmation phrase.
        Requires active session cookie. Rate limited: 1 per hour per user.
        User cannot be owner of any organization.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmation:
                  type: string
                  description: Must be exactly "DELETE MY ACCOUNT"
                  example: "DELETE MY ACCOUNT"
              required:
                - confirmation
      responses:
        200:
          description: Account successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
        400:
          description: Invalid confirmation phrase
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        403:
          description: User is owner of an organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  ownedOrganizations:
                    type: array
                    items:
                      type: string
        429:
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        401:
          description: Unauthenticated
        500:
          description: Internal server error

  /account/export:
    get:
      tags:
        - Account
      summary: Export user data (GDPR)
      description: |
        Download all user data as JSON file. Requires active session.
        Rate limited: 2 per hour per user.
        Export fails if user has more than 50,000 items.
      security:
        - sessionCookie: []
      responses:
        200:
          description: User data JSON file
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportDate:
                    type: string
                    format: date-time
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                      emailVerified:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                  memberships:
                    type: array
                  items:
                    type: array
                  stockMovements:
                    type: array
                  stockCounts:
                    type: array
                  countEntries:
                    type: array
                  purchaseOrders:
                    type: array
                  auditEvents:
                    type: array
                  sessions:
                    type: array
                  accounts:
                    type: array
        413:
          description: Export too large
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        429:
          description: Rate limit exceeded
        401:
          description: Unauthenticated
        500:
          description: Internal server error

  /auth/{...all}:
    get:
      tags:
        - Auth
      summary: Better Auth GET routes
      description: |
        Catch-all for Better Auth GET endpoints (session validation, etc).
        Forwarded to Better Auth router.
      parameters:
        - name: "...all"
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
        401:
          description: Unauthorized
        500:
          description: Internal server error
    post:
      tags:
        - Auth
      summary: Better Auth POST routes
      description: |
        Catch-all for Better Auth POST endpoints (sign-in, sign-up, etc).
        Includes registration gate and rate limiting:
        - Sign-in: 5 attempts per 5 minutes per IP
        - Sign-up: 3 per hour per IP, 2 per hour per email
      parameters:
        - name: "...all"
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
        403:
          description: Registration disabled or rate limit exceeded
        429:
          description: Rate limit exceeded
        500:
          description: Internal server error

  /auth/two-factor/verify:
    post:
      tags:
        - Auth
      summary: Verify 2FA code
      description: |
        Verify a TOTP or backup code after email/password authentication.
        Called when 2FA is enabled for the user.
        Rate limited: 10 per 5 minutes per user, plus per-IP limit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  description: User ID to verify
                code:
                  type: string
                  description: 6-digit TOTP or 8-char backup code
                sessionToken:
                  type: string
                  description: Optional pending session token from Better Auth
              required:
                - userId
                - code
      responses:
        200:
          description: Code verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  remainingBackupCodes:
                    type: integer
        400:
          description: Invalid or missing parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  verified:
                    type: boolean
        429:
          description: Rate limit exceeded
        500:
          description: Internal server error

  /billing/checkout:
    post:
      tags:
        - Billing
      summary: Create Stripe checkout session
      description: |
        Create a checkout session for subscription upgrade.
        Requires OWNER or ADMIN role. Stripe must be configured.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan:
                  type: string
                  enum: [PRO, BUSINESS]
                  description: Target plan
                interval:
                  type: string
                  enum: [month, year]
                  description: Billing interval (optional, defaults to month)
              required:
                - plan
      responses:
        200:
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Stripe checkout URL
        400:
          description: Invalid request or plan
        401:
          description: Unauthenticated
        403:
          description: Insufficient permissions
        404:
          description: Organization not found
        503:
          description: Stripe not configured

  /billing/portal:
    post:
      tags:
        - Billing
      summary: Create billing portal session
      description: |
        Create a Billing Portal session for subscription management.
        Requires OWNER or ADMIN role and existing Stripe customer.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Portal session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Billing portal URL
        401:
          description: Unauthenticated
        403:
          description: Insufficient permissions
        404:
          description: No billing account found
        503:
          description: Stripe not configured

  /billing/webhook:
    post:
      tags:
        - Billing
      summary: Stripe webhook endpoint
      description: |
        Receives Stripe events and updates subscription status.
        Public endpoint. Requires Stripe signature verification.
        Handles: checkout.session.completed, customer.subscription.updated/deleted,
        invoice.payment_failed/succeeded
      parameters:
        - name: stripe-signature
          in: header
          required: true
          schema:
            type: string
          description: Stripe webhook signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Event processed
        400:
          description: Invalid signature or missing fields
        500:
          description: Processing failed (Stripe will retry)
        503:
          description: Billing not configured

  /cron/stock-count-triggers:
    get:
      tags:
        - Cron
      summary: Trigger stock count pass
      description: |
        Executes stock count trigger pass for all recurring templates.
        Called every 15 minutes by Vercel Cron or external scheduler.
        Requires Bearer token authorization.
      security:
        - bearerToken: []
      responses:
        200:
          description: Trigger pass completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  triggered:
                    type: integer
                    description: Count of templates triggered
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        organizationId:
                          type: string
                        templateId:
                          type: string
                        countId:
                          type: string
                          nullable: true
                        reason:
                          type: string
        401:
          description: Unauthorized (invalid token)
        503:
          description: CRON_SECRET not configured

  /debug-dashboard:
    get:
      tags:
        - Health
      summary: Debug dashboard queries
      description: |
        Tests database connectivity and core queries.
        Requires active session. Returns results of each query.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Query results
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        500:
          description: Authentication or database error

  /health:
    get:
      tags:
        - Health
      summary: Health and readiness check
      description: |
        Comprehensive health probe with 4 sub-checks:
        1. Liveness: Is the server running?
        2. Database connectivity: Can we reach Postgres?
        3. Schema sentinel: Are core tables present?
        4. Migrations: Have all migrations been applied?

        No authentication required.
      responses:
        200:
          description: Healthy and ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthPayload'
        503:
          description: Not ready or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthPayload'

  /integrations/quickbooks/callback:
    get:
      tags:
        - Integrations
      summary: QuickBooks OAuth callback
      description: |
        Receives OAuth callback from QuickBooks.
        Exchanges authorization code for access token and stores integration.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State parameter (HMAC signed)
        - name: realmId
          in: query
          required: true
          schema:
            type: string
          description: QuickBooks realm ID
      responses:
        302:
          description: Redirect to settings page with success/error status
        400:
          description: Missing OAuth parameters
        403:
          description: Invalid state signature

  /integrations/quickbooks/webhooks:
    post:
      tags:
        - Integrations
      summary: QuickBooks webhook receiver
      description: |
        Receives entity change notifications from QuickBooks Online.
        Public endpoint. Requires HMAC-SHA256 signature verification.
      parameters:
        - name: intuit-signature
          in: header
          required: true
          schema:
            type: string
      responses:
        200:
          description: Webhooks processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  processed:
                    type: integer
        401:
          description: Invalid signature
        503:
          description: Webhook not configured

  /integrations/shopify/callback:
    get:
      tags:
        - Integrations
      summary: Shopify OAuth callback
      description: |
        Receives OAuth callback from Shopify.
        Exchanges authorization code for access token and stores integration.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: shop
          in: query
          required: true
          schema:
            type: string
          description: Shopify store domain
        - name: hmac
          in: query
          required: true
          schema:
            type: string
      responses:
        302:
          description: Redirect to settings page with success/error status
        400:
          description: Missing OAuth parameters
        403:
          description: Invalid state signature

  /integrations/shopify/webhooks:
    post:
      tags:
        - Integrations
      summary: Shopify webhook receiver
      description: |
        Receives topic notifications from Shopify.
        Public endpoint. Requires HMAC-SHA256 signature verification.
      parameters:
        - name: x-shopify-hmac-sha256
          in: header
          required: true
          schema:
            type: string
        - name: x-shopify-topic
          in: header
          required: true
          schema:
            type: string
        - name: x-shopify-shop-domain
          in: header
          required: true
          schema:
            type: string
      responses:
        200:
          description: Webhook processed
        400:
          description: Missing headers or invalid JSON
        401:
          description: Invalid signature
        503:
          description: Webhook not configured

  /labels/bin-labels/pdf:
    get:
      tags:
        - Labels
      summary: Generate bin labels PDF
      description: |
        Generate PDF with barcode labels for all bins in a warehouse.
        Requires active session and warehouse access.
      security:
        - sessionCookie: []
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: string
          description: Warehouse ID
      responses:
        200:
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        400:
          description: Missing or invalid warehouseId
        404:
          description: Warehouse not found
        401:
          description: Unauthenticated

  /labels/custom/pdf:
    post:
      tags:
        - Labels
      summary: Generate custom labels PDF
      description: |
        Generate custom labels from template for items, bins, or warehouses.
        Returns JSON (PDF generation is placeholder in implementation).
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateId:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [warehouse, bin, item]
                      id:
                        type: string
                  minItems: 1
              required:
                - templateId
                - items
      responses:
        200:
          description: Label data (JSON placeholder)
          content:
            application/json:
              schema:
                type: object
        400:
          description: Invalid request
        404:
          description: Template or items not found
        401:
          description: Unauthenticated

  /onboarding/organization:
    post:
      tags:
        - Onboarding
      summary: Create organization
      description: |
        Create a new organization with authenticated user as OWNER.
        Automatically creates default warehouse and sends welcome email.
        Rate limited: 3 per hour per user.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 80
                  description: Organization name
              required:
                - name
      responses:
        201:
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                      warehouses:
                        type: array
        400:
          description: Invalid request
        401:
          description: Unauthenticated
        429:
          description: Rate limit exceeded

  /reports/abc-analysis:
    post:
      tags:
        - Reports
      summary: Get ABC classification data
      description: |
        Retrieve ABC classification for all active items.
        Also handles /classify and /export sub-routes.
        Requires PRO or BUSINESS plan.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orgId:
                  type: string
              required:
                - orgId
      responses:
        200:
          description: ABC analysis data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    itemId:
                      type: string
                    sku:
                      type: string
                    name:
                      type: string
                    classification:
                      type: string
                      enum: [A, B, C]
        403:
          description: Plan not supported
        400:
          description: Invalid request
        401:
          description: Unauthenticated

  /reports/bin-inventory/pdf:
    get:
      tags:
        - Reports
      summary: Export bin inventory PDF
      description: |
        Export bin-tracked stock levels as PDF report.
        Requires PRO or BUSINESS plan.
        Rate limited: 10 per hour per user.
      security:
        - sessionCookie: []
      responses:
        200:
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        403:
          description: Plan not supported
        429:
          description: Rate limit exceeded
        401:
          description: Unauthenticated

  /reports/count-comparison:
    get:
      tags:
        - Reports
      summary: List stock counts
      description: |
        List available completed/in-progress stock counts.
        Supports /counts sub-path.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Stock count list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    state:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    itemCount:
                      type: integer
    post:
      tags:
        - Reports
      summary: Compare two stock counts
      description: |
        Compare two stock counts and calculate variances.
        Supports /compare and /export sub-routes.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                count1Id:
                  type: string
                count2Id:
                  type: string
              required:
                - count1Id
                - count2Id
      responses:
        200:
          description: Comparison data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    itemId:
                      type: string
                    sku:
                      type: string
                    name:
                      type: string
                    count1Qty:
                      type: integer
                      nullable: true
                    count2Qty:
                      type: integer
                      nullable: true
                    variance:
                      type: integer
                    variancePercent:
                      type: number
        403:
          description: Unauthorized access
        404:
          description: Count not found

  /reports/count-comparison/pdf:
    post:
      tags:
        - Reports
      summary: Export count comparison PDF
      description: |
        Export count comparison as PDF.
        Requires PRO or BUSINESS plan.
        Rate limited: 10 per hour per user.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                count1Id:
                  type: string
                count2Id:
                  type: string
              required:
                - count1Id
                - count2Id
      responses:
        200:
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        403:
          description: Plan not supported
        429:
          description: Rate limit exceeded
        400:
          description: Invalid request

  /reports/department-variance:
    get:
      tags:
        - Reports
      summary: Get department variance data
      description: |
        Retrieve variance analysis by department.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Department variance data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    departmentId:
                      type: string
                    departmentName:
                      type: string
                    itemCount:
                      type: integer
                    variance:
                      type: integer
                    variancePercent:
                      type: number
                    status:
                      type: string
                      enum: [good, warning, critical]
    post:
      tags:
        - Reports
      summary: Export department variance
      description: |
        Export department variance as CSV or XLSX.
        Supports /export sub-route.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  enum: [csv, xlsx]
                data:
                  type: array
              required:
                - format
                - data
      responses:
        200:
          description: CSV or Excel file
        400:
          description: Invalid request

  /reports/department-variance/pdf:
    get:
      tags:
        - Reports
      summary: Export department variance PDF
      description: |
        Export department variance as PDF.
        Requires PRO or BUSINESS plan.
        Rate limited: 10 per hour per user.
      security:
        - sessionCookie: []
      responses:
        200:
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        403:
          description: Plan not supported
        429:
          description: Rate limit exceeded

  /reports/low-stock/pdf:
    get:
      tags:
        - Reports
      summary: Export low stock items PDF
      description: |
        Export items below reorder point as PDF.
        Requires PRO or BUSINESS plan.
        Rate limited: 10 per hour per user.
      security:
        - sessionCookie: []
      responses:
        200:
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        403:
          description: Plan not supported
        429:
          description: Rate limit exceeded
        401:
          description: Unauthenticated

  /reports/movements/pdf:
    get:
      tags:
        - Reports
      summary: Export stock movements PDF
      description: |
        Export stock movement history as PDF (last 1000 movements).
        Requires PRO or BUSINESS plan.
        Rate limited: 10 per hour per user.
      security:
        - sessionCookie: []
      responses:
        200:
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        403:
          description: Plan not supported
        429:
          description: Rate limit exceeded
        401:
          description: Unauthenticated

  /reports/stock-value/pdf:
    get:
      tags:
        - Reports
      summary: Export stock value PDF
      description: |
        Export stock value by warehouse as PDF.
        Calculates total value using cost price.
        Requires PRO or BUSINESS plan.
        Rate limited: 10 per hour per user.
      security:
        - sessionCookie: []
      responses:
        200:
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        403:
          description: Plan not supported
        429:
          description: Rate limit exceeded
        401:
          description: Unauthenticated

  /reports/variance-trend:
    get:
      tags:
        - Reports
      summary: Get variance trend data
      description: |
        Retrieve 30-day variance trend data.
      security:
        - sessionCookie: []
      responses:
        200:
          description: Trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                      format: date
                    variance:
                      type: number
    post:
      tags:
        - Reports
      summary: Export variance trend
      description: |
        Export variance trend as CSV or XLSX.
        Supports /export sub-route.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  enum: [csv, xlsx]
                data:
                  type: array
      responses:
        200:
          description: CSV or Excel file

  /upload/image:
    post:
      tags:
        - Upload
      summary: Upload item image
      description: |
        Upload image for item. Accepts JPEG, PNG, WebP.
        Max 5MB. Validates magic bytes (not just extension).
        Rate limited: 20 per minute per user.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, or WebP)
              required:
                - file
      responses:
        200:
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Public URL to uploaded image
        400:
          description: Invalid file type or size
        429:
          description: Rate limit exceeded
        401:
          description: Unauthenticated

  /webhooks/inbound:
    post:
      tags:
        - Webhooks
      summary: Receive inbound webhooks
      description: |
        Generic inbound webhook endpoint for integration events.
        Public endpoint. Requires HMAC-SHA256 signature verification.
        Supports multiple event types (imports, syncs, stock counts, etc).
      parameters:
        - name: x-webhook-signature
          in: header
          required: true
          schema:
            type: string
        - name: x-webhook-timestamp
          in: header
          required: true
          schema:
            type: string
            format: date-time
        - name: x-webhook-delivery-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  description: Event type (e.g., integration.sync.items)
                organizationId:
                  type: string
                data:
                  type: object
              required:
                - event
                - organizationId
                - data
      responses:
        200:
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deliveryId:
                    type: string
                  processed:
                    type: boolean
                  action:
                    type: string
        400:
          description: Invalid JSON, missing headers, or payload too nested
        401:
          description: Invalid signature
        404:
          description: Organization not found
        413:
          description: Payload too large
        500:
          description: Processing error
    head:
      tags:
        - Webhooks
      summary: Webhook health check
      description: Health check endpoint for webhook delivery validation.
      responses:
        200:
          description: Healthy

components:
  schemas:
    HealthPayload:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        uptime:
          type: integer
          description: Server uptime in seconds
        timestamp:
          type: string
          format: date-time
        environment:
          type: string
          description: Node environment (e.g., production)
        version:
          type: string
          description: Deployment version
        commit:
          type: string
          description: Commit SHA (first 7 chars)
        checks:
          type: object
          properties:
            database:
              type: string
              enum: [ok, fail]
            schema:
              type: string
              enum: [ok, fail]
            migrations:
              type: string
              enum: [ok, fail, skipped]
        errors:
          type: array
          items:
            type: string
          description: Error messages (only present when status is degraded)

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Better Auth session cookie
    bearerToken:
      type: http
      scheme: bearer
      description: Bearer token for cron endpoints (CRON_SECRET)
